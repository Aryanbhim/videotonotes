services:
  - type: web
    name: video-to-notes
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: YOUTUBE_PROXY
        sync: false
      - key: YOUTUBE_COOKIES
        sync: false
      - key: WEBSHARE_USERNAME
        sync: false
      - key: WEBSHARE_PASSWORD
        sync: false
